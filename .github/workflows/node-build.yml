name: Node Build

on:
  push:
    branches: [ main, 'feature/**' ]
    paths-ignore: [ 'docs/**' ]
  pull_request:
    branches: [ main ]

jobs:
  instalacja-zaleznosci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      
      - run: npm ci

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
